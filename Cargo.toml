[package]
name = "io-oauth"
description = "Set of I/O-free coroutines to manage OAuth flows"
version = "1.0.0"
authors = ["soywod <clement.douin@posteo.net>"]
edition = "2021"
license = "MIT"
categories = ["api-bindings"]
keywords = ["io-free", "coroutine", "runtime", "oauth", "http"]
homepage = "https://pimalaya.org"
documentation = "https://docs.rs/io-oauth/latest/io_oauth"
repository = "https://github.com/pimalaya/io-oauth"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dev-dependencies]
env_logger = "0.11"
io-stream = { version = "1", default-features = false, features = ["std"] }
native-tls = "0.2"
rustls = "0.23"
rustls-platform-verifier = "0.5"

[dependencies]
base64 = "0.22"
http = "1.3"
io-http = { version = "1", default-features = false }
io-stream = { version = "1", default-features = false }
log = "0.4"
rand = "0.9"
secrecy = { version = "0.10", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2.5"

[patch.crates-io]
io-http.git = "https://github.com/pimalaya/io-http"
io-stream.git = "https://github.com/pimalaya/io-stream"
